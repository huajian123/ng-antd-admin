<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="p-24">
  <!-- 修改 Tab 标题 -->
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="edit"></span>
    修改 Tab 标题
  </div>
  <nz-card class="m-b-24" [nzBordered]="false">
    <p class="pg-card-desc m-b-20">修改当前标签页的显示标题，不影响页面内容标题。</p>
    <nz-space-compact class="title-input-row" nzSize="default">
      <input #tabTitleInput nz-input placeholder="输入新的 Tab 标题" />
      <button nz-button nzType="primary" (click)="changeTabTitle(tabTitleInput.value)">
        <span nz-icon nzTheme="outline" nzType="check"></span>
        设置标题
      </button>
    </nz-space-compact>
  </nz-card>

  <!-- 标签页操作 -->
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="close-circle"></span>
    标签页操作
  </div>
  <nz-card class="m-b-24" [nzBordered]="false">
    <p class="pg-card-desc m-b-20">对当前已打开的标签页进行批量或单个关闭操作。</p>
    <div class="btn-group">
      <button nz-button nzType="default" (click)="closeRight()">
        <span nz-icon nzTheme="outline" nzType="right-circle"></span>
        关闭右侧
      </button>
      <button nz-button nzType="default" (click)="closeLeft()">
        <span nz-icon nzTheme="outline" nzType="left-circle"></span>
        关闭左侧
      </button>
      <button nz-button nzType="default" (click)="closeOther()">
        <span nz-icon nzTheme="outline" nzType="minus-circle"></span>
        关闭其他
      </button>
      <button nz-button nzDanger nzType="primary" (click)="closeCurrent()">
        <span nz-icon nzTheme="outline" nzType="close-circle"></span>
        关闭当前
      </button>
      <button nz-button nzType="primary" (click)="refresh()">
        <span nz-icon nzTheme="outline" nzType="reload"></span>
        刷新
      </button>
    </div>
  </nz-card>

  <!-- 打开详情页 -->
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="file-search"></span>
    打开详情页
  </div>
  <nz-card [nzBordered]="false">
    <p class="pg-card-desc m-b-20">在新标签页中打开详情页，演示多标签页之间的跳转与参数传递。</p>
    <div class="btn-group">
      @for (i of detailItems; track i) {
        <button nz-button nzType="default" (click)="openDetailPage(i)">
          <span nz-icon nzTheme="outline" nzType="file-text"></span>
          详情页 {{ i }}
        </button>
      }
    </div>
  </nz-card>
</div>
