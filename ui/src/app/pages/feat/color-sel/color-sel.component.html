<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="p-24">
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="bg-colors"></span>
    颜色选择器
  </div>
  <nz-card [nzBordered]="false">
    <p class="pg-card-desc m-b-24">基于 <code class="inline-code">ngx-color-picker</code> 封装，支持多种模式与输出格式。点击色块或文字即可唤起选色面板。</p>

    <div nz-row [nzGutter]="[24, 24]">
      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">默认模式</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input class="color-input" [colorPicker]="color" [style.background]="color" (colorPickerChange)="color = $event" />
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">灰度模式</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input class="color-input" [cpColorMode]="'grayscale'" [style.background]="color" [(colorPicker)]="color" />
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">输入框显示色值</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input class="color-input" [style.background]="color" [value]="color" [(colorPicker)]="color" />
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">输出格式 RGBA</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input class="color-input" [cpOutputFormat]="'rgba'" [style.background]="color" [value]="color" [(colorPicker)]="color" />
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">弹出位置 top-right</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input class="color-input" [cpPosition]="'top-right'" [style.background]="color" [value]="color" [(colorPicker)]="color" />
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">文字触发 + 偏移量</span>
          <div class="demo-row">
            <span class="color-trigger-text" [cpPosition]="'bottom'" [cpPositionOffset]="'50%'" [cpPositionRelativeToArrow]="true" [style.color]="color" [(colorPicker)]="color">Change me!</span>
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">显示取消按钮</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input class="color-input" [cpCancelButton]="true" [style.background]="color" [value]="color" [(colorPicker)]="color" />
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">显示确认按钮</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input
              class="color-input"
              [cpOKButton]="true"
              [cpOKButtonClass]="'btn btn-primary btn-xs'"
              [cpSaveClickOutside]="false"
              [style.background]="color"
              [value]="color"
              [(colorPicker)]="color"
            />
          </div>
        </div>
      </div>

      <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
        <div class="demo-item">
          <span class="demo-label">吸管工具</span>
          <div class="demo-row">
            <span class="color-swatch" [style.background]="color"></span>
            <input
              class="color-input"
              [cpEyeDropper]="true"
              [cpOKButtonClass]="'btn btn-primary btn-xs'"
              [cpSaveClickOutside]="false"
              [style.background]="color"
              [value]="color"
              [(colorPicker)]="color"
            />
          </div>
        </div>
      </div>
    </div>
  </nz-card>
</div>
