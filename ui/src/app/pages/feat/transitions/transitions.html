<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="p-24">
  <nz-card class="p-24 m-b-20 b-r-8" [nzBodyStyle]="{ padding: 0 }">
    <div class="left-start-center" style="gap: 12px">
      <span class="sp-32">✨</span>
      <div>
        <h3 class="m-0">共享元素过渡演示</h3>
        <p class="sp-14 m-0">
          点击任意卡片，观察封面从列表位置平滑过渡到详情页。由
          <code>withViewTransitions()</code> + <code>ViewTransitionDirective</code> 驱动。
        </p>
      </div>
    </div>
  </nz-card>

  <div nz-row [nzGutter]="[24, 24]">
    @for (item of items; track item.id) {
      <div nz-col [nzLg]="8" [nzMd]="8" [nzSm]="12" [nzXl]="8" [nzXs]="24">
        <nz-card nzHoverable [nzBodyStyle]="{ padding: 0 }" (click)="toDetail(item.id)">
          <div class="card-cover" appViewTransition="card-image" [id]="item.id" [style.background]="item.color">
            <span class="cover-emoji">{{ item.id }}</span>
            <div class="cover-overlay"></div>
            <div class="cover-title">
              <h3 class="m-0">{{ item.title }}</h3>
              <p class="sp-12 m-0">{{ item.subtitle }}</p>
            </div>
          </div>
          <div class="card-body p-16">
            <div class="flex" style="gap: 6px; flex-wrap: wrap">
              @for (tag of item.tags; track tag) {
                <nz-tag [nzColor]="item.color">{{ tag }}</nz-tag>
              }
            </div>
            <p class="sp-12 m-t-8 m-0 pg-card-desc">{{ item.desc }}</p>
          </div>
        </nz-card>
      </div>
    }
  </div>
</div>
