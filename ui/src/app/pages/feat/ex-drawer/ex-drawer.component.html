<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="p-24">
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="layout"></span>
    服务方式创建
  </div>
  <nz-card [nzBordered]="false">
    <p class="pg-card-desc m-b-20">通过注入 <code class="inline-code">ExDrawerDrawerService</code> 以编程方式打开抽屉，支持传参与回调获取返回值。</p>
    <div class="drawer-row m-b-20">
      <input nz-input placeholder="传入到抽屉的值" [(ngModel)]="data" />
      <button nz-button nzType="primary" (click)="showDrawer()">
        <span nz-icon nzTheme="outline" nzType="layout"></span>
        打开抽屉
      </button>
    </div>
    @if (dataFromDrawer()) {
      <div class="return-row">
        <span class="return-label">抽屉返回值</span>
        <nz-tag nzColor="blue">{{ dataFromDrawer() }}</nz-tag>
      </div>
    }
  </nz-card>
</div>
