<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="p-24">
  <!-- 固定搜索表单 -->
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="search"></span>
    固定搜索表单
  </div>
  <nz-card class="m-b-24" [nzBodyStyle]="{ 'padding-bottom': 0 }" [nzBordered]="false">
    <p class="pg-card-desc m-b-16">字段数量固定，不支持展开/收起。</p>
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>菜单名称</nz-form-label>
            <nz-form-control>
              <input name="menuName" nz-input placeholder="请输入菜单名称" [(ngModel)]="searchParam.ruleName" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>描述</nz-form-label>
            <nz-form-control>
              <input name="desc" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div class="form-actions" nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <button nz-button nzType="primary">
            <span nz-icon nzType="search"></span>
            搜索
          </button>
          <button nz-button (click)="resetForm()">
            <span nz-icon nzTheme="outline" nzType="redo"></span>
            重置
          </button>
        </div>
      </div>
    </form>
  </nz-card>

  <!-- 可折叠搜索表单（4 字段） -->
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="filter"></span>
    可折叠搜索表单（4 字段）
  </div>
  <nz-card class="m-b-24" [nzBodyStyle]="{ 'padding-bottom': 0 }" [nzBordered]="false">
    <p class="pg-card-desc m-b-16">默认收起，点击展开/收起切换额外字段的显示。</p>
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>规则名称</nz-form-label>
            <nz-form-control>
              <input name="ruleName" nz-input placeholder="请输入" [(ngModel)]="searchParam.ruleName" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>描述</nz-form-label>
            <nz-form-control>
              <input name="desc" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
            </nz-form-control>
          </nz-form-item>
        </div>
        @if (!isCollapse) {
          <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
            <nz-form-item>
              <nz-form-label>服务调用次数</nz-form-label>
              <nz-form-control>
                <input name="callCount" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
            <nz-form-item>
              <nz-form-label>状态</nz-form-label>
              <nz-form-control>
                <input name="status" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24"></div>
        }
        <div class="form-actions" nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <button nz-button nzType="primary">
            <span nz-icon nzType="search"></span>
            搜索
          </button>
          <button nz-button (click)="resetForm()">
            <span nz-icon nzTheme="outline" nzType="redo"></span>
            重置
          </button>
          <a class="collapse-toggle" (click)="toggleCollapse()">
            {{ isCollapse ? '展开' : '收起' }}
            <span nz-icon [nzType]="isCollapse ? 'down' : 'up'"></span>
          </a>
        </div>
      </div>
    </form>
  </nz-card>

  <!-- 可折叠搜索表单（5 字段） -->
  <div class="pg-section-label m-b-10">
    <span nz-icon nzTheme="outline" nzType="filter"></span>
    可折叠搜索表单（5 字段）
  </div>
  <nz-card [nzBodyStyle]="{ 'padding-bottom': 0 }" [nzBordered]="false">
    <p class="pg-card-desc m-b-16">与上方相同的折叠逻辑，额外增加一个「上次调度时间」字段。</p>
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>规则名称</nz-form-label>
            <nz-form-control>
              <input name="ruleName2" nz-input placeholder="请输入" [(ngModel)]="searchParam.ruleName" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>描述</nz-form-label>
            <nz-form-control>
              <input name="desc2" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
            </nz-form-control>
          </nz-form-item>
        </div>
        @if (!isCollapse) {
          <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
            <nz-form-item>
              <nz-form-label>服务调用次数</nz-form-label>
              <nz-form-control>
                <input name="callCount2" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
            <nz-form-item>
              <nz-form-label>状态</nz-form-label>
              <nz-form-control>
                <input name="status2" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
            <nz-form-item>
              <nz-form-label>上次调度时间</nz-form-label>
              <nz-form-control>
                <input name="lastSchedule" nz-input placeholder="请输入" [(ngModel)]="searchParam.desc" />
              </nz-form-control>
            </nz-form-item>
          </div>
        }
        <div class="form-actions" nz-col [nzLg]="8" [nzMd]="12" [nzXs]="24">
          <button nz-button nzType="primary">
            <span nz-icon nzType="search"></span>
            搜索
          </button>
          <button nz-button (click)="resetForm()">
            <span nz-icon nzTheme="outline" nzType="redo"></span>
            重置
          </button>
          <a class="collapse-toggle" (click)="toggleCollapse()">
            {{ isCollapse ? '展开' : '收起' }}
            <span nz-icon [nzType]="isCollapse ? 'down' : 'up'"></span>
          </a>
        </div>
      </div>
    </form>
  </nz-card>
</div>
